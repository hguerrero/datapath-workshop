apiVersion: v1
kind: ConfigMap
metadata:
  name: expense-agent-config
  namespace: expense-agent
  labels:
    app.kubernetes.io/name: expense-agent
data:
  # Server listen port — must match containerPort in deployment.yaml
  PORT: "3000"
  # NODE_ENV is already set to "production" in the Dockerfile; override here
  # if you need "development" behaviour in a non-prod cluster.
  NODE_ENV: "production"
