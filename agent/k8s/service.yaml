apiVersion: v1
kind: Service
metadata:
  name: expense-agent
  namespace: expense-agent
  labels:
    app.kubernetes.io/name: expense-agent
spec:
  # ClusterIP keeps the service internal; traffic enters via the Ingress.
  # Change to LoadBalancer for quick cloud testing without an Ingress controller.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: expense-agent
  ports:
    - name: http
      port: 80
      targetPort: http          # resolves to containerPort "http" = 3000
      protocol: TCP
