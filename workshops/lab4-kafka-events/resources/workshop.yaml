apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-data-path-kafka
spec:
  title: "Kong Data Path — Lab 4: Governing the Way Out"
  description: >
    Labs 1–3 governed the way in — every LLM call, MCP tool lookup, and
    retrieval operation controlled at the gateway. Lab 4 completes the story
    by governing the way out: agent decisions flowing into Kafka are proxied
    through Kong Event Gateway with OAuth identity (reusing the Kong Identity
    server from Lab 2), per-student namespace isolation, and default-deny ACLs
    enforced at the gateway layer — the same principles applied to the
    retrieval path, now applied to mutation.
  vendor: konghq.com
  authors:
  - Kong Technical Product Marketing
  difficulty: intermediate
  url: https://github.com/hguerreroo/datapath-workshop
  duration: 45m
  publish:
    image: docker.io/hguerreroo/lab-kafka-events-files:latest
  workshop:
    files:
    - image:
        url: docker.io/hguerreroo/lab-kafka-events-files:latest
      includePaths:
      - /workshop/**
      - /excercises/**
      - /README.md
  session:
    namespaces:
      budget: small
      security:
        policy: baseline
    applications:
      terminal:
        enabled: true
      editor:
        enabled: true
      console:
        enabled: false
    env:
      - name: PROXY
        value: "$(session_namespace)-proxy.$(ingress_domain)"
      - name: AGENT_API_KEY
        value: "$(agent_api_key)"
      - name: KAFKA_BOOTSTRAP
        value: "$(kafka_bootstrap)"
      - name: EVENT_GW_HOST
        value: "$(event_gw_host)"
      - name: EVENT_GW_PORT
        value: "$(event_gw_port)"
      - name: STUDENT_ID
        value: "$(session_namespace)"
      - name: ISSUER_URL
        value: "$(issuer_url)"
      - name: TOKEN_ENDPOINT
        value: "$(token_endpoint)"
      - name: CLIENT_ID
        value: "$(client_id)"
      - name: CLIENT_SECRET
        value: "$(client_secret)"
      - name: KONNECT_TOKEN
        value: "$(konnect_token)"
