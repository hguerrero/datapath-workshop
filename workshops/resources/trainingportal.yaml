apiVersion: training.educates.dev/v1beta1
kind: TrainingPortal
metadata:
  name: portal
spec:
  portal:
    title: Kong Workshops
    logo: "data:image/png;base64,"
    ingress:
      hostname: portal
    password: agenticera
    registration:
      type: anonymous
    sessions:
      maximum: 250
    updates:
      workshop: true
    workshop:
      defaults:
        reserved: 10
        expires: 90m
        deadline: 120m
        overtime: 10m
  workshops:
  - alias: "mcp-lab1"
    name: lab-mcp-conversion
    initial: 40
  - alias: "mcp-lab2"
    name: lab-mcp-passthrough
  - alias: "mcp-lab3"
    expires: 30m
    name: lab-mcp-registry
  - alias: "dp-lab1"
    name: lab-data-path-agent-loop
    initial: 40
  - alias: "dp-lab2"
    name: lab-data-path-auth
  - alias: "dp-lab3"
    name: lab-data-path-llm-governance
  - alias: "dp-lab4"
    name: lab-data-path-kafka
