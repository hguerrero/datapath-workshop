apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-data-path-llm-governance
spec:
  title: "Kong Data Path — Lab 3: LLM Governance"
  description: >
    The /llm route is already in place from Lab 1. Now govern it: add
    per-consumer token rate limiting to control spend, configure multi-provider
    failover to Anthropic, add AI Prompt Guard to block prompt injection, and
    enable semantic caching to eliminate redundant LLM calls — all as Konnect
    plugin configuration with zero agent code changes.
  vendor: konghq.com
  authors:
  - Kong Technical Product Marketing
  difficulty: intermediate
  url: https://github.com/hguerreroo/datapath-workshop
  duration: 90m
  publish:
    image: docker.io/hguerreroo/lab-llm-governance-files:latest
  workshop:
    files:
    - image:
        url: docker.io/hguerreroo/lab-llm-governance-files:latest
      includePaths:
      - /workshop/**
      - /excercises/**
      - /README.md
  session:
    resources:
      memory: "128Mi"  
    namespaces:
      budget: small
      security:
        policy: baseline
    applications:
      terminal:
        enabled: true
      editor:
        enabled: false
      console:
        enabled: false
    env:
      - name: PROXY
        value: "$(session_namespace)-proxy.$(ingress_domain)"
    ingresses:
      - name: expense-agent
        port: 80
        host: expense-agent-service
        protocol: TCP
    dashboards:
      - name: Expense Agent
        url: "$(ingress_protocol)://expense-agent-$(session_namespace).$(ingress_domain)/"      
  environment:
    objects:
    # Agent deployment resources
    - apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: expense-agent
        labels:
          app: expense-agent
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: expense-agent
        template:
          metadata:
            labels:
              app: expense-agent
          spec:
            containers:
            - name: expense-agent
              image: docker.io/hguerreroo/expense-agent:1.0.0
              imagePullPolicy: Always
              ports:
              - name: http
                containerPort: 3000
              env:
              - name: PORT
                value: "3000"
              - name: NODE_ENV
                value: "production"
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "500m"
              volumeMounts:
              - name: tmp
                mountPath: /tmp
            volumes:
            - name: tmp
              emptyDir: {}
    - apiVersion: v1
      kind: Service
      metadata:
        name: expense-agent-service
        labels:
          app: expense-agent
      spec:
        type: ClusterIP
        selector:
          app: expense-agent
        ports:
        - name: http
          port: 80
          targetPort: http          